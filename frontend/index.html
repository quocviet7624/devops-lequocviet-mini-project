<!DOCTYPE html>
<html lang="vi">
<head><title>DevOps Project</title></head>
<body>
    <h1>Thông tin cá nhân (Lấy từ DB)</h1>
    <div id="info" style="border: 1px solid #000; padding: 10px; margin-bottom: 10px;"></div>
    
    <h3>Cập nhật thông tin:</h3>
    <input id="name" placeholder="Họ tên">
    <input id="msv" placeholder="MSSV">
    <input id="class" placeholder="Lớp">
    <button onclick="updateInfo()">Cập nhật</button>

    <script>
        const API = "http://localhost:5000/api";
    
        function loadInfo() {
            fetch(`${API}/about`).then(r => r.json()).then(data => {
                document.getElementById('info').innerHTML = `Họ tên: ${data.name} <br> MSSV: ${data.msv} <br> Lớp: ${data.class}`;
            });
        }

        function updateInfo() {
            const body = {
                name: document.getElementById('name').value,
                msv: document.getElementById('msv').value,
                class: document.getElementById('class').value
            };
            fetch(`${API}/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            }).then(() => { alert("Xong!"); loadInfo(); });
        }
        loadInfo();
    </script>
</body>
</html>
